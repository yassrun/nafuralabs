<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 40" fill="none" role="img" aria-label="Nafura ERP">
  <!-- Construction icon: stylized building/crane mark -->
  <g transform="translate(0,4)">
    <!-- Base rectangle (building) -->
    <rect x="2" y="16" width="28" height="18" rx="1.5" fill="#0f766e"/>
    <!-- Windows grid -->
    <rect x="5" y="19" width="5" height="4" rx="0.5" fill="white" opacity="0.8"/>
    <rect x="13" y="19" width="5" height="4" rx="0.5" fill="white" opacity="0.8"/>
    <rect x="21" y="19" width="5" height="4" rx="0.5" fill="white" opacity="0.8"/>
    <rect x="5" y="26" width="5" height="4" rx="0.5" fill="white" opacity="0.8"/>
    <rect x="13" y="26" width="5" height="4" rx="0.5" fill="white" opacity="0.8"/>
    <rect x="21" y="26" width="5" height="4" rx="0.5" fill="white" opacity="0.8"/>
    <!-- Crane arm -->
    <rect x="14" y="2" width="18" height="2.5" rx="1.25" fill="#0d9488"/>
    <rect x="14" y="2" width="2.5" height="16" rx="1.25" fill="#0d9488"/>
    <!-- Crane hook cable -->
    <line x1="28" y1="4.5" x2="28" y2="14" stroke="#0d9488" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="28" cy="15" r="1.5" fill="#0d9488"/>
  </g>

  <!-- Logotype "Nafura" -->
  <text x="38" y="26" font-family="'Plus Jakarta Sans', system-ui, sans-serif" font-size="15" font-weight="700" fill="#0f172a" letter-spacing="-0.3">Nafura</text>

  <!-- "ERP" tag -->
  <rect x="108" y="13" width="30" height="14" rx="4" fill="#0f766e"/>
  <text x="123" y="23.5" font-family="'Plus Jakarta Sans', system-ui, sans-serif" font-size="9" font-weight="700" fill="white" text-anchor="middle" letter-spacing="0.5">ERP</text>

  <!-- Tagline -->
  <text x="38" y="36" font-family="'Plus Jakarta Sans', system-ui, sans-serif" font-size="7.5" fill="#94a3b8" letter-spacing="0.5">GESTION BTP MAROC</text>
</svg>
