apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sektor-btp-ingress
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  ingressClassName: nginx
  rules:
    - host: api.sektor.nafuralabs.staging
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: sektor-btp-backend
                port:
                  number: 8082
    - host: sektor.nafuralabs.staging
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: sektor-btp-web
                port:
                  number: 80
