<nf-page-shell scroll>
  @if (!printMode()) {
    <nf-page-header [config]="headerConfig"></nf-page-header>

    <div class="situation-detail-layout">
      <div class="situation-detail-layout__main">
        @if (mode() === 'view' && item(); as sit) {
          <section class="sit-approval">
            <span class="sit-approval__label">Approbation situation</span>
            <app-submit-approval-button
              entityType="SIT"
              [entityId]="sit.id"
              [entityRef]="sit.numero"
              [entitySummary]="sit.numero + ' — ' + (sit.chantierCode ?? '') + ' — net ' + (sit.netAPayerHt | number) + ' MAD HT'"
              [montantConcerne]="sit.netAPayerHt"
              [chantierId]="sit.chantierId"
              [chantierCode]="sit.chantierCode"
              [disabled]="sit.status !== 'BROUILLON'">
            </app-submit-approval-button>
          </section>
        }
        <nf-entity-detail
          #detail
          [config]="config"
          [mode]="mode()"
          [item]="item()"
          [lookups]="lookups()"
          [loading]="isLoading()"
          [saving]="isSaving()"
          (action)="onAction($event)"
          (transitionRequest)="handleTransition($event)">

          <ng-template nfField="lignes" let-control>
            <app-lots-saisie-table
              [lines]="currentLignes()"
              [readonly]="mode() === 'view'"
              (linesChange)="onLignesChange(control, $event)" />
          </ng-template>

        </nf-entity-detail>
      </div>

      <aside class="situation-detail-layout__aside">
        <app-decompte-card [values]="decompteLive()" [sticky]="true" />
      </aside>
    </div>
  }

  @if (printMode() && item()) {
    <app-decompte-print [situation]="item()!" />
  }
</nf-page-shell>
