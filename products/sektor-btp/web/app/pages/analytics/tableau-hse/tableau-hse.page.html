<nf-page-shell>
  <nf-page-header [config]="headerConfig()"></nf-page-header>

  <div class="analytics-toolbar">
    <label>
      {{ 'erp.analyticsTableau.common.periodFrom' | translate }}
      <input type="date" [ngModel]="periodFrom()" (ngModelChange)="periodFrom.set($event)" />
    </label>
    <label>
      {{ 'erp.analyticsTableau.common.periodTo' | translate }}
      <input type="date" [ngModel]="periodTo()" (ngModelChange)="periodTo.set($event)" />
    </label>
    <nf-button variant="secondary" icon="refresh-cw" iconLibrary="lucide" (clicked)="refresh()">
      {{ 'erp.analyticsTableau.common.refresh' | translate }}
    </nf-button>
  </div>

  @if (loaded()) {
    <div class="analytics-grid">
      <nf-stat-card [label]="'erp.analyticsTableau.hse.stats.incidents' | translate" [value]="incidentsYtd()" icon="alert-triangle" variant="danger"></nf-stat-card>
      <nf-stat-card [label]="'erp.analyticsTableau.hse.stats.graves' | translate" [value]="incidentsGraves()" icon="alert-circle" variant="warning"></nf-stat-card>
      <nf-stat-card [label]="'erp.analyticsTableau.hse.stats.joursArret' | translate" [value]="joursArretYtd()" icon="calendar-off" variant="default"></nf-stat-card>
      <nf-stat-card [label]="'erp.analyticsTableau.hse.stats.nc' | translate" [value]="ncOuvertes()" icon="file-warning" variant="warning"></nf-stat-card>
      <nf-stat-card [label]="'erp.analyticsTableau.hse.stats.inspections' | translate" [value]="inspectionsEnCours()" icon="clipboard-check" variant="info"></nf-stat-card>
      <nf-stat-card [label]="'erp.analyticsTableau.hse.stats.formations' | translate" [value]="formationsTerminees()" icon="graduation-cap" variant="success"></nf-stat-card>
    </div>

    <div class="analytics-charts">
      <section class="analytics-chart-card">
        <h3 class="analytics-chart-card__title">{{ 'erp.analyticsTableau.hse.charts.severity' | translate }}</h3>
        <div class="analytics-chart-card__body">
          <nf-chart type="bar" [data]="severityChart()" [options]="chartOptions()" height="240px" [minHeight]="200" />
        </div>
      </section>
      <section class="analytics-chart-card">
        <h3 class="analytics-chart-card__title">{{ 'erp.analyticsTableau.hse.charts.complianceByBu' | translate }}</h3>
        <div class="analytics-chart-card__body">
          <nf-chart type="bar" [data]="complianceChart()" [options]="chartOptions()" height="240px" [minHeight]="200" />
        </div>
      </section>
    </div>
  } @else {
    <p class="loading-msg">{{ 'erp.analyticsTableau.common.loading' | translate }}</p>
  }
</nf-page-shell>
