<nf-page-shell>
  <nf-page-header [config]="headerConfig()"></nf-page-header>

  <div class="analytics-toolbar">
    <label>
      {{ 'erp.analyticsTableau.common.periodFrom' | translate }}
      <input type="date" [ngModel]="periodFrom()" (ngModelChange)="periodFrom.set($event)" />
    </label>
    <label>
      {{ 'erp.analyticsTableau.common.periodTo' | translate }}
      <input type="date" [ngModel]="periodTo()" (ngModelChange)="periodTo.set($event)" />
    </label>
    <nf-button variant="secondary" icon="refresh-cw" iconLibrary="lucide" (clicked)="refresh()">
      {{ 'erp.analyticsTableau.common.refresh' | translate }}
    </nf-button>
  </div>

  @if (loaded()) {
    <div class="analytics-grid">
      <nf-stat-card [label]="'erp.analyticsTableau.financier.stats.caFacture' | translate" [value]="(caFactureHt() | mad) ?? '—'" icon="trending-up" variant="primary"></nf-stat-card>
      <nf-stat-card [label]="'erp.analyticsTableau.financier.stats.caEncaisse' | translate" [value]="(caEncaisseHt() | mad) ?? '—'" icon="check-circle" variant="success"></nf-stat-card>
      <nf-stat-card [label]="'erp.analyticsTableau.financier.stats.reste' | translate" [value]="(resteAEncaisser() | mad) ?? '—'" icon="clock" variant="warning"></nf-stat-card>
      <nf-stat-card [label]="'erp.analyticsTableau.financier.stats.factures' | translate" [value]="facturesEmises()" icon="file-text" variant="default"></nf-stat-card>
      <nf-stat-card [label]="'erp.analyticsTableau.financier.stats.retard' | translate" [value]="facturesEnRetard()" icon="alert-circle" variant="danger"></nf-stat-card>
      <nf-stat-card [label]="'erp.analyticsTableau.financier.stats.rg' | translate" [value]="(retenuesGarantie() | mad) ?? '—'" icon="shield" variant="info"></nf-stat-card>
    </div>

    <div class="analytics-charts">
      <section class="analytics-chart-card">
        <h3 class="analytics-chart-card__title">{{ 'erp.analyticsTableau.financier.charts.caByBu' | translate }}</h3>
        <div class="analytics-chart-card__body">
          <nf-chart type="bar" [data]="caChart()" [options]="chartOptions()" height="240px" [minHeight]="200" />
        </div>
      </section>
      <section class="analytics-chart-card">
        <h3 class="analytics-chart-card__title">{{ 'erp.analyticsTableau.financier.charts.invoiceSplit' | translate }}</h3>
        <div class="analytics-chart-card__body">
          <nf-chart type="doughnut" [data]="invoiceChart()" [options]="chartOptions()" height="240px" [minHeight]="200" />
        </div>
      </section>
    </div>
  } @else {
    <p class="loading-msg">{{ 'erp.analyticsTableau.common.loading' | translate }}</p>
  }
</nf-page-shell>
