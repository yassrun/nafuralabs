<nf-page-shell>
  <nf-page-header [config]="headerConfig()"></nf-page-header>

  <div class="analytics-toolbar">
    <label>
      {{ 'erp.analyticsTableau.common.periodFrom' | translate }}
      <input type="date" [ngModel]="periodFrom()" (ngModelChange)="periodFrom.set($event)" />
    </label>
    <label>
      {{ 'erp.analyticsTableau.common.periodTo' | translate }}
      <input type="date" [ngModel]="periodTo()" (ngModelChange)="periodTo.set($event)" />
    </label>
    <nf-button variant="secondary" icon="refresh-cw" iconLibrary="lucide" (clicked)="refresh()">
      {{ 'erp.analyticsTableau.common.refresh' | translate }}
    </nf-button>
  </div>

  @if (loaded()) {
    <div class="analytics-grid">
      <nf-stat-card [label]="'erp.analyticsTableau.chantiers.stats.total' | translate" [value]="totalChantiers()" icon="construction" variant="primary"></nf-stat-card>
      <nf-stat-card [label]="'erp.analyticsTableau.chantiers.stats.enCours' | translate" [value]="chantiersEnCours()" icon="hard-hat" variant="warning"></nf-stat-card>
      <nf-stat-card [label]="'erp.analyticsTableau.chantiers.stats.termines' | translate" [value]="chantiersTermines()" icon="check-circle" variant="success"></nf-stat-card>
      <nf-stat-card [label]="'erp.analyticsTableau.chantiers.stats.situations' | translate" [value]="situationsEmises()" icon="file-text" variant="default"></nf-stat-card>
      <nf-stat-card [label]="'erp.analyticsTableau.chantiers.stats.avancement' | translate" [value]="avencements() + '%'" icon="trending-up" variant="primary"></nf-stat-card>
      <nf-stat-card [label]="'erp.analyticsTableau.chantiers.stats.budget' | translate" [value]="(totalBudget() | mad) ?? '—'" icon="wallet" variant="default"></nf-stat-card>
    </div>

    <div class="analytics-charts">
      <section class="analytics-chart-card">
        <h3 class="analytics-chart-card__title">{{ 'erp.analyticsTableau.chantiers.charts.budgetByBu' | translate }}</h3>
        <div class="analytics-chart-card__body">
          <nf-chart type="bar" [data]="budgetChart()" [options]="chartOptions()" height="240px" [minHeight]="200" />
        </div>
      </section>
      <section class="analytics-chart-card">
        <h3 class="analytics-chart-card__title">{{ 'erp.analyticsTableau.chantiers.charts.statusSplit' | translate }}</h3>
        <div class="analytics-chart-card__body">
          <nf-chart type="doughnut" [data]="statusChart()" [options]="chartOptions()" height="240px" [minHeight]="200" />
        </div>
      </section>
    </div>
  } @else {
    <p class="loading-msg">{{ 'erp.analyticsTableau.common.loading' | translate }}</p>
  }
</nf-page-shell>
