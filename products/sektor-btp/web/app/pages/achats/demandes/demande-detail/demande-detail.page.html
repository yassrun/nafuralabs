<nf-page-shell>
  <nf-page-header [config]="headerConfig"></nf-page-header>

  @if (mode() === 'view' && item(); as da) {
    <section class="approval-bar">
      <span class="approval-bar__label">{{ 'achats.common.approval.label' | translate }}</span>
      <app-submit-approval-button
        entityType="DA"
        [entityId]="da.id"
        [entityRef]="da.numero"
        [entitySummary]="da.numero + ' — ' + (da.totalEstimeHt | number) + ' MAD HT'"
        [montantConcerne]="da.totalEstimeHt"
        [chantierId]="da.chantierId"
        [chantierCode]="da.chantierCode"
        [disabled]="da.status !== 'BROUILLON'">
      </app-submit-approval-button>
    </section>
  }

  <nf-entity-detail
    #detail
    [config]="config"
    [mode]="mode()"
    [item]="item()"
    [lookups]="lookups()"
    [loading]="isLoading()"
    [saving]="isSaving()"
    (action)="onAction($event)">
  </nf-entity-detail>
</nf-page-shell>
