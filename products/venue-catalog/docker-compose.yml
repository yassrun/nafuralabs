version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: nafura_venue_catalog
      POSTGRES_USER: seyrura
      POSTGRES_PASSWORD: seyrura
    ports:
      - "5433:5432"
    volumes:
      - venue_catalog_pg:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6380:6379"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - venue_catalog_minio:/data

volumes:
  venue_catalog_pg:
  venue_catalog_minio:
