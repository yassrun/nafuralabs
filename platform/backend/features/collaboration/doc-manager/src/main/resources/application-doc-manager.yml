spring:
  application:
    name: documents-service
  
  datasource:
    url: jdbc:postgresql://localhost:5432/documentsdb
    username: ${POSTGRES_USER:model_gateway_user}
    password: ${POSTGRES_PASSWORD:model_gateway_pass}
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        show_sql: false
    open-in-view: false

documents:
  minio:
    endpoint: http://localhost:9000
    accessKey: ${MINIO_ROOT_USER:minioadmin}
    secretKey: ${MINIO_ROOT_PASSWORD:minioadmin}
    bucket: documents
    secure: false

server:
  port: 8081

logging:
  level:
    root: INFO
    ma.nafura.platform.collaboration.docmanager: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

