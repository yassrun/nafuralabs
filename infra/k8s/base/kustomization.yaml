apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

generatorOptions:
  disableNameSuffixHash: true

configMapGenerator:
  - name: keycloak-realm
    files:
      - iam-portal-realm.json=infra/iam-portal-realm.json

resources:
  # ─────────────────────────────────────────────────────────────────
  # Infrastructure (shared resources)
  # ─────────────────────────────────────────────────────────────────
  - infra/vault.yaml
  - infra/service-accounts.yaml
  - infra/postgres.yaml
  - infra/keycloak.yaml
  - infra/minio.yaml
  - infra/minio-init-job.yaml
  - infra/opensearch.yaml
  - infra/ingress.yaml
  - infra/vault-sync-job.yaml

  # ─────────────────────────────────────────────────────────────────
  # Monitoring Stack (optional)
  # ─────────────────────────────────────────────────────────────────
  # - infra/monitoring

  # Product manifests live under products/<app-id>/deploy/k8s/ — not here.
