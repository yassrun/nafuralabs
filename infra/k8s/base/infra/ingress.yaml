apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nafura-ingress
  annotations:
    nginx.ingress.kubernetes.io/proxy-buffer-size: "128k"
spec:
  ingressClassName: nginx
  rules:
    # ─────────────────────────────────────────────────────────────────
    # Infrastructure Services
    # ─────────────────────────────────────────────────────────────────
    - host: iam.nafura.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: keycloak
                port:
                  number: 8080
    - host: minio.nafura.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: minio
                port:
                  number: 9001
    - host: s3.nafura.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: minio
                port:
                  number: 9000
    - host: vault.nafura.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: vault
                port:
                  number: 8200
    - host: search.nafura.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: opensearch-dashboards
                port:
                  number: 5601
    # ─────────────────────────────────────────────────────────────────
    # Frontend
    # ─────────────────────────────────────────────────────────────────
