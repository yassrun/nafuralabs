# RBAC for vault-bootstrap / vault-unseal jobs (read/write local unseal keys — Docker Desktop staging only).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: vault-bootstrap
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: vault-bootstrap
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["vault-bootstrap"]
    verbs: ["get", "create", "update", "patch"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["serviceaccounts/token"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: vault-bootstrap
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: vault-bootstrap
subjects:
  - kind: ServiceAccount
    name: vault-bootstrap
    namespace: default
