# PostgreSQL Database
# Single instance with multiple databases: keycloak, nafura_<appId> per app
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-data
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init
data:
  init.sql: |
    -- Seyrura Nafura Database Initialization
    -- Only keycloak DB at init; app DBs created on provision/sync.
    -- DATABASE: keycloak
    CREATE DATABASE keycloak;
    
    
    
    
    
    
    
    
    
    
    
    
    
    
    
    
    
    
    -- Grant privileges (app DBs created on provision/sync)
    GRANT ALL PRIVILEGES ON DATABASE keycloak TO nafura;
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
spec:
  ports:
    - port: 5432
      targetPort: 5432
  selector:
    app: postgres
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "postgres"
        vault.hashicorp.com/agent-inject-secret-db: "secret/data/nafura/dev/infra/postgres"
        vault.hashicorp.com/agent-inject-template-db: |
          {{- with secret "secret/data/nafura/dev/infra/postgres" -}}
          export POSTGRES_USER="{{ .Data.data.username }}"
          export POSTGRES_PASSWORD="{{ .Data.data.password }}"
          {{- end }}
    spec:
      serviceAccountName: postgres
      containers:
        - name: postgres
          image: postgres:16-alpine
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -a
              . /vault/secrets/db
              set +a
              exec docker-entrypoint.sh postgres
          env:
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
            - name: postgres-init
              mountPath: /docker-entrypoint-initdb.d
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "nafura"]
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "nafura"]
            initialDelaySeconds: 30
            periodSeconds: 10
      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: postgres-data
        - name: postgres-init
          configMap:
            name: postgres-init
