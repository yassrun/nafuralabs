# ServiceAccounts for Vault Kubernetes Auth
# Each workload that needs secrets gets a dedicated SA; vault-init.sh binds them to Vault roles.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: postgres
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: keycloak
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: minio
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: socle-backend
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: core-backend
