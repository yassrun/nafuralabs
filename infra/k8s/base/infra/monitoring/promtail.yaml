# ═══════════════════════════════════════════════════════════════════════════════
# Promtail - Log Collector (DaemonSet)
# ═══════════════════════════════════════════════════════════════════════════════
# Promtail runs on every node and collects logs from all pods.
# Logs are enriched with Kubernetes labels and sent to Loki.
#
# Auto-discovery: All pod logs are collected automatically.
# ═══════════════════════════════════════════════════════════════════════════════
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: promtail-config
  labels:
    app: promtail
data:
  promtail.yaml: |
    server:
      http_listen_port: 9080
      grpc_listen_port: 0

    positions:
      filename: /tmp/positions.yaml

    clients:
      - url: http://loki:3100/loki/api/v1/push

    scrape_configs:
      # ─────────────────────────────────────────────────────────────────
      # Kubernetes Pods
      # ─────────────────────────────────────────────────────────────────
      - job_name: kubernetes-pods
        kubernetes_sd_configs:
          - role: pod
        
        pipeline_stages:
          # Try to parse JSON logs
          - json:
              expressions:
                level: level
                message: message
                ts: ts
                trace_id: trace_id
                span_id: span_id
                service: service
          
          # Extract labels from JSON
          - labels:
              level:
              trace_id:
              span_id:
              service:
          
          # Fallback for non-JSON logs
          - match:
              selector: '{level=""}'
              stages:
                - regex:
                    expression: '(?P<level>(DEBUG|INFO|WARN|ERROR|FATAL))'
                - labels:
                    level:

        relabel_configs:
          # Keep all pods
          - action: keep
            regex: .+
            source_labels:
              - __meta_kubernetes_pod_name
          
          # Pod name as label
          - source_labels:
              - __meta_kubernetes_pod_name
            target_label: pod
          
          # Namespace as label
          - source_labels:
              - __meta_kubernetes_namespace
            target_label: namespace
          
          # Container name as label
          - source_labels:
              - __meta_kubernetes_pod_container_name
            target_label: container
          
          # App label from pod labels
          - source_labels:
              - __meta_kubernetes_pod_label_app
            target_label: app
          
          # Product label (for Nafura products)
          - source_labels:
              - __meta_kubernetes_pod_label_product
            target_label: product
          
          # Node name
          - source_labels:
              - __meta_kubernetes_pod_node_name
            target_label: node
          
          # Log file path
          - replacement: /var/log/pods/*$1/*.log
            separator: /
            source_labels:
              - __meta_kubernetes_pod_uid
              - __meta_kubernetes_pod_container_name
            target_label: __path__
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: promtail
  labels:
    app: promtail
spec:
  selector:
    matchLabels:
      app: promtail
  template:
    metadata:
      labels:
        app: promtail
    spec:
      serviceAccountName: promtail
      containers:
        - name: promtail
          image: grafana/promtail:2.9.2
          args:
            - '-config.file=/etc/promtail/promtail.yaml'
          ports:
            - containerPort: 9080
              name: http
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          volumeMounts:
            - name: config
              mountPath: /etc/promtail
            - name: varlog
              mountPath: /var/log
              readOnly: true
            - name: varlibdockercontainers
              mountPath: /var/lib/docker/containers
              readOnly: true
            - name: positions
              mountPath: /tmp
          env:
            - name: HOSTNAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
      volumes:
        - name: config
          configMap:
            name: promtail-config
        - name: varlog
          hostPath:
            path: /var/log
        - name: varlibdockercontainers
          hostPath:
            path: /var/lib/docker/containers
        - name: positions
          emptyDir: {}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: promtail
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: promtail
rules:
  - apiGroups: [""]
    resources:
      - nodes
      - nodes/proxy
      - services
      - endpoints
      - pods
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: promtail
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: promtail
subjects:
  - kind: ServiceAccount
    name: promtail
    namespace: default
