# ═══════════════════════════════════════════════════════════════════════════════
# Grafana - Observability Dashboard
# ═══════════════════════════════════════════════════════════════════════════════
# Unified dashboard for metrics (Prometheus), logs (Loki), and traces (Tempo).
# Pre-configured with all datasources and basic dashboards.
#
# Access: http://monitoring.nafura.local
# Default credentials: admin / admin (change on first login)
# ═══════════════════════════════════════════════════════════════════════════════
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  labels:
    app: grafana
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      # ─────────────────────────────────────────────────────────────────
      # Prometheus - Metrics
      # ─────────────────────────────────────────────────────────────────
      - name: Prometheus
        type: prometheus
        uid: prometheus
        access: proxy
        url: http://prometheus:9090/prometheus
        isDefault: true
        editable: true
        jsonData:
          timeInterval: "15s"
          httpMethod: POST

      # ─────────────────────────────────────────────────────────────────
      # Loki - Logs
      # ─────────────────────────────────────────────────────────────────
      - name: Loki
        type: loki
        uid: loki
        access: proxy
        url: http://loki:3100
        editable: true
        jsonData:
          derivedFields:
            - name: TraceID
              datasourceUid: tempo
              matcherRegex: '"trace_id":"(\w+)"'
              url: '$${__value.raw}'

      # ─────────────────────────────────────────────────────────────────
      # Tempo - Traces
      # ─────────────────────────────────────────────────────────────────
      - name: Tempo
        type: tempo
        uid: tempo
        access: proxy
        url: http://tempo:3200
        editable: true
        jsonData:
          tracesToLogsV2:
            datasourceUid: loki
            spanStartTimeShift: '-1h'
            spanEndTimeShift: '1h'
            filterByTraceID: true
            filterBySpanID: false
            tags:
              - key: service.name
                value: service
          tracesToMetrics:
            datasourceUid: prometheus
            spanStartTimeShift: '-1h'
            spanEndTimeShift: '1h'
            tags:
              - key: service.name
                value: application
          serviceMap:
            datasourceUid: prometheus
          nodeGraph:
            enabled: true
          lokiSearch:
            datasourceUid: loki
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards-provider
  labels:
    app: grafana
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: 'default'
        orgId: 1
        folder: 'Nafura'
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards
---
