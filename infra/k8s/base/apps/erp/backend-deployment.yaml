apiVersion: apps/v1
kind: Deployment
metadata:
  name: erp-backend
  namespace: nafura-erp-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: erp-backend
  template:
    metadata:
      labels:
        app: erp-backend
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "erp-backend"
        vault.hashicorp.com/agent-inject-secret-app-db: "secret/data/nafura/dev/apps/erp/db"
        vault.hashicorp.com/agent-inject-template-app-db: |
          {{- with secret "secret/data/nafura/dev/apps/erp/db" -}}
          export POSTGRES_DB="{{ .Data.data.name }}"
          export POSTGRES_SCHEMA="{{ .Data.data.schema }}"
          export POSTGRES_USER="{{ .Data.data.user }}"
          export POSTGRES_PASSWORD="{{ .Data.data.pass }}"
          export NAFURA_AI_SQL_READ_ONLY_DATASOURCE_USERNAME="{{ .Data.data.ai_user }}"
          export NAFURA_AI_SQL_READ_ONLY_DATASOURCE_PASSWORD="{{ .Data.data.ai_user_password }}"
          {{- end }}
        vault.hashicorp.com/agent-inject-secret-app-minio: "secret/data/nafura/dev/apps/erp/minio"
        vault.hashicorp.com/agent-inject-template-app-minio: |
          {{- with secret "secret/data/nafura/dev/apps/erp/minio" -}}
          export DOCUMENTS_MINIO_ENDPOINT="{{ .Data.data.endpoint }}"
          export DOCUMENTS_MINIO_BUCKET="{{ .Data.data.bucket }}"
          export MINIO_ROOT_USER="{{ .Data.data.user }}"
          export MINIO_ROOT_PASSWORD="{{ .Data.data.password }}"
          {{- end }}
        vault.hashicorp.com/agent-inject-secret-app-llm: "secret/data/nafura/dev/infra/llm"
        vault.hashicorp.com/agent-inject-template-app-llm: |
          {{- with secret "secret/data/nafura/dev/infra/llm" -}}
          export AI_GEMINI_API_KEY="{{ .Data.data.gemini_api_key }}"
          export BREVO_API_KEY="{{ .Data.data.brevo_api_key }}"
          export SENDGRID_API_KEY="{{ .Data.data.sendgrid_api_key }}"
          {{- end }}
        vault.hashicorp.com/agent-inject-secret-app-keycloak: "secret/data/nafura/dev/infra/keycloak"
        vault.hashicorp.com/agent-inject-template-app-keycloak: |
          {{- with secret "secret/data/nafura/dev/infra/keycloak" -}}
          export KEYCLOAK_ADMIN_USERNAME="{{ .Data.data.admin_username }}"
          export KEYCLOAK_ADMIN_PASSWORD="{{ .Data.data.admin_password }}"
          {{- end }}
    spec:
      serviceAccountName: erp-backend
      containers:
        - name: erp-backend
          image: erp-backend:dev
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -a
              . /vault/secrets/app-db
              . /vault/secrets/app-minio
              . /vault/secrets/app-llm
              . /vault/secrets/app-keycloak
              set +a
              exec java -jar app.jar
          ports:
            - containerPort: 8082
          env:
            - name: POSTGRES_HOST
              value: postgres.default.svc
            - name: SPRING_JPA_HIBERNATE_DDL_AUTO
              value: update
            - name: KEYCLOAK_ISSUER_URI
              value: http://iam.nafura.local/realms/iam-portal
            - name: KEYCLOAK_JWK_SET_URI
              value: http://keycloak.default.svc:8080/realms/iam-portal/protocol/openid-connect/certs
            - name: APP_FRONTEND_BASE_URL
              value: http://erp.nafura.local
            - name: KEYCLOAK_ADMIN_URL
              value: http://keycloak.default.svc:8080
            - name: NAFURA_ONBOARDING_DEV_SIGNUP
              value: "false"
            - name: NAFURA_ONBOARDING_KEYCLOAK_PROVISIONING
              value: "true"
            - name: EMAIL_PROVIDER
              value: brevo
            - name: AI_GEMINI_MODEL
              value: gemini-2.5-flash
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8082
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8082
            initialDelaySeconds: 45
            periodSeconds: 20
