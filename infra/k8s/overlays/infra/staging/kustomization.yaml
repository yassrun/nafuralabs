apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: nafura-infra

resources:
  - ../../../base/infra/namespace.yaml
  - ../../../base/infra/vault.yaml
  - ../../../base/infra/vault-bootstrap-rbac.yaml
  - ../../../base/infra/service-accounts.yaml
  - ../../../base/infra/postgres.yaml
  - ../../../base/infra/redis.yaml
  - ../../../base/infra/keycloak.yaml
  - ../../../base/infra/minio.yaml
  - ../../../base/infra/minio-init-job.yaml
  - ../../../base/infra/ingress.yaml
  - ../../../base/infra/vault-init-job.yaml
  - vault-unseal-cronjob.yaml

generatorOptions:
  disableNameSuffixHash: true

configMapGenerator:
  - name: keycloak-realm
    files:
      - iam-portal-realm.json=../../../base/infra/iam-portal-realm.json

patches:
  - target:
      kind: PersistentVolumeClaim
      name: postgres-data
    path: pvc-storageclass-docker-desktop.yaml
  - target:
      kind: PersistentVolumeClaim
      name: minio-data
    path: pvc-storageclass-docker-desktop.yaml
  - target:
      kind: PersistentVolumeClaim
      name: vault-data
    path: pvc-storageclass-docker-desktop.yaml
