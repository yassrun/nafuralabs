# GKE Autopilot blocks leader election in kube-system; cert-manager manifest omits lease RBAC in app namespace.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: cert-manager-leader-election
  namespace: cert-manager
rules:
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "create", "update", "patch", "watch", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: cert-manager-leader-election
  namespace: cert-manager
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: cert-manager-leader-election
subjects:
  - kind: ServiceAccount
    name: cert-manager
    namespace: cert-manager
  - kind: ServiceAccount
    name: cert-manager-cainjector
    namespace: cert-manager
